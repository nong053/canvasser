            <div class="col-sm-8">
              <input type="text" class="form-control" id="idCardTxt" placeholder="เลขบัตรประชาชน">
            </div>
          </div>

              <input type="text" class="form-control" id="noAddressTxt" placeholder="บ้านเลขที่">
            </div>
          </div>

              <input type="text" class="form-control" id="groupAddressTxt" placeholder="หมู่ที่">
            </div>
          </div>

            <div class="col-sm-8">
              <input type="text" class="form-control" id="subDistrictTxt" placeholder="ตำบล">
            </div>
          </div>
          <div  class="form-group">
            <label for="districtTxt" class="col-sm-4 control-label">อำเภอ <span class="redFont">*</span></label>

            <div class="col-sm-8">
              <input type="text" class="form-control" id="districtTxt" placeholder="อำเภอ">
